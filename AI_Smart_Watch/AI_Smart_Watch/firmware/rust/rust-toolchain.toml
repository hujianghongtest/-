# ╔══════════════════════════════════════════════════════════════╗
# ║  Rust 工具链配置文件                                        ║
# ║  固定 ESP32-S3 所需的 Xtensa Rust 工具链版本                 ║
# ╚══════════════════════════════════════════════════════════════╝
#
# 安装方法:
#   cargo install espup
#   espup install
#
# 这将自动安装:
#   - rustup 工具链: esp (Xtensa + RISC-V)
#   - ESP-IDF
#   - cargo-espflash (烧录工具)
#   - cargo-espmonitor (串口监视器)

[toolchain]
# ESP 工具链名称 (由 espup 安装)
channel = "esp"
# 目标三元组 — ESP32-S3 Xtensa LX7 处理器
targets = ["xtensa-esp32s3-espidf"]
# 组件: rust-src 是 ESP-IDF 构建所需的
components = ["rust-src"]
