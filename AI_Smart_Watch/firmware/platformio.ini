; PlatformIO Project Configuration for AI Smart Watch
; Target: ESP32-S3-Zero (Waveshare)

[env:esp32-s3-zero]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Use the Waveshare ESP32-S3-Zero board variant
; board_build.flash_mode = qio
; board_build.f_flash = 80000000L

lib_deps =
    ; Display driver
    bodmer/TFT_eSPI@^2.5.43
    ; LVGL for UI
    lvgl/lvgl@^9.1.0
    ; BME280 sensor
    adafruit/Adafruit BME280 Library@^2.2.4
    adafruit/Adafruit Unified Sensor@^1.1.14
    ; RTC DS3231
    adafruit/RTClib@^2.1.4
    ; Audio I2S
    ; ESP32-audioI2S (manual install or git)
    ; WiFi + HTTP client
    bblanchon/ArduinoJson@^7.0.4

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DUSER_SETUP_LOADED=1
    ; TFT_eSPI config for ST7789 240x240
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_BL=47
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000
