; ╔══════════════════════════════════════════════════════════╗
; ║  AI Smart Watch — PlatformIO 项目配置文件                ║
; ║  目标平台: ESP32-S3-Zero (Waveshare)                    ║
; ║  开发框架: Arduino + TFT_eSPI + LVGL + BME280 + RTClib  ║
; ╚══════════════════════════════════════════════════════════╝

[env:esp32-s3-zero]

; ── 平台配置 ──
; 使用 Espressif 官方 ESP32 平台 (基于 ESP-IDF)
platform = espressif32
; 使用 ESP32-S3-DevKitC-1 作为近似开发板 (与 Zero 引脚兼容)
; Waveshare ESP32-S3-Zero 无独立 board 定义, DevKitC-1 最接近
board = esp32-s3-devkitc-1
; Arduino 框架 (C++ 开发, 库生态丰富)
framework = arduino

; ── 通信接口配置 ──
; 串口监视器波特率 (与代码中 Serial.begin() 一致)
monitor_speed = 115200
; 烧录速度 (ESP32-S3 支持高速 USB-CDC 烧录)
upload_speed = 921600

; ── Flash 配置 (可选, 大部分情况自动检测) ──
; ESP32-S3-Zero 通常使用 16MB QIO Flash
; board_build.flash_mode = qio
; board_build.f_flash = 80000000L

; ═══════════════════════════════════════════════════════════
; 第三方依赖库
; ═══════════════════════════════════════════════════════════
lib_deps =
    ; --- 显示屏驱动 ---
    ; TFT_eSPI: 高性能 SPI TFT 驱动库
    ; 支持 ST7789 / GC9A01 / ILI9341 等多种控制器
    ; 引脚配置通过 build_flags 传入 (不单独编辑 User_Setup.h)
    bodmer/TFT_eSPI@^2.5.43

    ; --- LVGL 图形库 ---
    ; 轻量级通用图形库, 用于构建手表 UI 界面
    ; 后续版本将替换手动 drawWatchFace 逻辑
    lvgl/lvgl@^9.1.0

    ; --- BME280 传感器 ---
    ; Adafruit 官方 BME280 驱动 (温度+湿度+气压)
    adafruit/Adafruit BME280 Library@^2.2.4
    ; Adafruit 统一传感器抽象层 (BME280 依赖)
    adafruit/Adafruit Unified Sensor@^1.1.14

    ; --- DS3231 RTC ---
    ; RTClib: Adafruit 通用 RTC 库 (支持 DS3231/DS1307/PCF8523)
    adafruit/RTClib@^2.1.4

    ; --- ArduinoJson ---
    ; JSON 解析与生成 (用于 AI API 请求/响应)
    bblanchon/ArduinoJson@^7.0.4

    ; --- ESP32-audioI2S (手动安装) ---
    ; I2S 音频输入输出库 (INMP441 + MAX98357)
    ; 需要从 GitHub 手动安装: https://github.com/schreibfaul1/ESP32-audioI2S
    ; 或使用 ESP-ADF 替代

; ═══════════════════════════════════════════════════════════
; 编译宏定义 — 通过编译参数注入
;
; TFT_eSPI 库通过编译宏读取引脚配置,
; 这样无需手动编辑库内部的 User_Setup.h 文件,
; 使项目更便携, 方便在不同开发者之间共享。
; ═══════════════════════════════════════════════════════════
build_flags =
    ; 启用 TFT_eSPI 的编译宏配置模式
    ; (告知库: 不要用默认的 User_Setup.h, 用下面的定义)
    -DUSER_SETUP_LOADED=1

    ; --- 显示屏驱动选择 ---
    ; ST7789: 240×240 方形屏 (1.54")
    ; 如果使用 GC9A01 圆形屏, 改为 -DGC9A01_DRIVER=1
    -DST7789_DRIVER=1
    ; 分辨率
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240

    ; --- 显示屏引脚 (与 Hardware_Design.md 完全一致) ---
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=13
    -DTFT_RST=14
    -DTFT_BL=47

    ; --- SPI 时钟频率 ---
    ; 40MHz: 屏幕刷新流畅, 连线需 <10cm
    ; 降低至 27MHz 或 20MHz 可改善长线稳定性
    -DSPI_FREQUENCY=40000000
    ; SPI 读取频率 (通常减半)
    -DSPI_READ_FREQUENCY=16000000

    ; --- 调试日志级别 ---
    ; 0=None  1=Error  2=Warn  3=Info  4=Debug  5=Verbose
    -DCORE_DEBUG_LEVEL=1

; ═══════════════════════════════════════════════════════════
; 如果使用 GC9A01 圆形屏 (1.28"), 将上方驱动选择改为:
;
;   -DGC9A01_DRIVER=1
;   (注释掉 -DST7789_DRIVER=1)
;
; GC9A01 与 ST7789 引脚兼容, 初始化序列不同,
; TFT_eSPI 库会自动处理差异。
; ═══════════════════════════════════════════════════════════
